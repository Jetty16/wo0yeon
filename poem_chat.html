<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>현실의 구름은 실선 꿈속의 구름은 점선</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .status-bar {
    height: 44px;
    padding: 14px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #000; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { fill: #000; }

  .header {
    padding: 6px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid #C6C6C8;
    flex-shrink: 0;
  }
  .header-back {
    display: flex;
    align-items: center;
    gap: 2px;
    color: #007AFF;
    font-size: 17px;
    cursor: pointer;
  }
  .header-back svg { fill: #007AFF; }
  .header-center { display: flex; flex-direction: column; align-items: center; }
  .header-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #6E9FF0, #3D7CF5);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #fff;
    margin-bottom: 2px;
  }
  .header-name {
    font-size: 12px; color: #000; font-weight: 400;
    max-width: 180px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .header-icons { display: flex; gap: 20px; align-items: center; }
  .header-icon { color: #007AFF; }
  .header-icon svg { fill: #007AFF; width: 22px; height: 22px; }

  .thread {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
  }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    margin: 3px 0;
  }
  .bubble-wrap.me { align-items: flex-end; }
  .bubble-wrap.them { align-items: flex-start; }
  .bubble-wrap.visible { opacity: 1; transform: translateY(0); }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    font-size: 16px;
    line-height: 1.5;
    white-space: pre-line;
    position: relative;
  }
  .bubble.me {
    background: #007AFF;
    color: #fff;
    border-radius: 18px 18px 4px 18px;
  }
  .bubble.them {
    background: #E5E5EA;
    color: #000;
    border-radius: 18px 18px 18px 4px;
    font-style: italic;
  }

  .tick {
    font-size: 11px;
    color: #8E8E93;
    margin-top: 2px;
    margin-right: 4px;
    transition: opacity 0.4s;
  }

  .typing-wrap {
    display: flex;
    align-items: flex-start;
    margin: 3px 0;
  }
  .typing-bubble {
    background: #E5E5EA;
    border-radius: 18px 18px 18px 4px;
    padding: 10px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #8E8E93;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .input-bar {
    padding: 8px 12px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 0.5px solid #C6C6C8;
    flex-shrink: 0;
  }
  .input-field {
    flex: 1;
    border: 1px solid #C6C6C8;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 16px;
    color: #8E8E93;
    background: #fff;
    outline: none;
  }
  .send-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #E5E5EA;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .send-btn svg { fill: #8E8E93; width: 18px; height: 18px; }

  .replay-btn {
    position: fixed;
    bottom: 88px;
    right: 16px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .replay-btn.visible { opacity: 1; }
</style>
</head>
<body>

<div class="status-bar">
  <span class="status-time" id="clock">9:41</span>
  <div class="status-icons">
    <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.5C10.5 2.5 12.7 3.5 14.3 5.2L15.7 3.8C13.7 1.7 11 0.5 8 0.5C5 0.5 2.3 1.7 0.3 3.8L1.7 5.2C3.3 3.5 5.5 2.5 8 2.5Z"/><path d="M8 6C9.7 6 11.2 6.7 12.3 7.8L13.7 6.4C12.2 4.9 10.2 4 8 4C5.8 4 3.8 4.9 2.3 6.4L3.7 7.8C4.8 6.7 6.3 6 8 6Z"/><circle cx="8" cy="11" r="1.5"/></svg>
    <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#000" stroke-opacity="0.35" fill="none"/><rect x="22" y="4" width="2.5" height="4" rx="1" fill="#000" fill-opacity="0.4"/><rect x="2" y="2" width="15" height="8" rx="2" fill="#000"/></svg>
  </div>
</div>

<div class="header">
  <div class="header-back">
    <svg width="10" height="17" viewBox="0 0 10 17"><path d="M8.5 1L1.5 8.5L8.5 16" stroke="#007AFF" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    &nbsp;뒤로
  </div>
  <div class="header-center">
    <div class="header-avatar">시</div>
    <div class="header-name">현실의 구름은 실선 꿈속의 구름은 점선</div>
  </div>
  <div class="header-icons">
    <span class="header-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.47 11.47 0 003.58.57 1 1 0 011 1V21a1 1 0 01-1 1A17 17 0 013 5a1 1 0 011-1h3.5a1 1 0 011 1 11.47 11.47 0 00.57 3.58 1 1 0 01-.24 1.01z"/></svg>
    </span>
    <span class="header-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
    </span>
  </div>
</div>

<div class="thread" id="thread"></div>

<button class="replay-btn" id="replayBtn">다시 보기 ↺</button>

<div class="input-bar">
  <div class="input-field">문자 메시지</div>
  <div class="send-btn">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </div>
</div>

<script>
const messages = [
  { sender:'me', text:'참 아픈 꿈을 꾸었다\n눈에 눈물은 세수를 재촉한다\n매번 눈물은 한순간에 나를 어린 애로 만들어버린다' },
  { sender:'them', text:'일어나 눈을 비비는 사람이다' },
  { sender:'me', text:'그때를 여러 번 꿈으로 인출시킨 탓에\n이제는 어디까지가 기억인지 추억인지 억측인지 모를 그때를\n아프게 조립한다' },
  { sender:'them', text:'일어나 멍을 때리는 사람이다' },
  { sender:'me', text:'꿈이 꿈이었다는 사실을 인정하고 사느니\n차라리 현실과 꿈을 구분 짓지 않기로 했다\n이건 점선이냐 실선이냐 정도의 차이일 뿐이니' },
  { sender:'them', text:'잠이 많은 사람이다' }
];

const thread = document.getElementById('thread');
const replayBtn = document.getElementById('replayBtn');
let timer = null;
let idx = 0;

function now() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  return h + ':' + String(m).padStart(2,'0');
}
document.getElementById('clock').textContent = now();

function removeLastTick() {
  const ticks = thread.querySelectorAll('[data-tick]');
  if (ticks.length) ticks[ticks.length-1].style.opacity = '0';
}

function scrollDown() {
  thread.scrollTop = thread.scrollHeight;
}

function appendBubble(m) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + m.sender;

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + m.sender;
  bubble.textContent = m.text;
  wrap.appendChild(bubble);

  if (m.sender === 'me') {
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.dataset.tick = '1';
    tick.textContent = '읽지 않음';
    wrap.appendChild(tick);
  }

  thread.appendChild(wrap);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      wrap.classList.add('visible');
      scrollDown();
    });
  });
}

function showTyping(cb) {
  removeLastTick();
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  const b = document.createElement('div');
  b.className = 'typing-bubble';
  b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(b);
  thread.appendChild(wrap);
  scrollDown();
  timer = setTimeout(() => {
    wrap.remove();
    cb();
  }, 1100);
}

function renderNext() {
  if (idx >= messages.length) {
    replayBtn.classList.add('visible');
    return;
  }
  const m = messages[idx];
  if (m.sender === 'them') {
    showTyping(() => {
      appendBubble(m);
      idx++;
      timer = setTimeout(renderNext, 1600);
    });
  } else {
    appendBubble(m);
    idx++;
    timer = setTimeout(renderNext, 1400);
  }
}

function start() {
  clearTimeout(timer);
  thread.innerHTML = '';
  idx = 0;
  replayBtn.classList.remove('visible');
  timer = setTimeout(renderNext, 700);
}

replayBtn.addEventListener('click', start);
start();
</script>
</body>
</html>
